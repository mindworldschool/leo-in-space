    const LeoSpaceNavigator = () => {
      // === Универсальная версия билда для кэш-бастинга ===
      const BUILD_VERSION =
        new URLSearchParams(location.search).get('v') ||

        '1';

      const withV = (path) => `${path}${path.includes('?') ? '&' : '?'}v=${BUILD_VERSION}`;
      const SOUND_VERSION = BUILD_VERSION; // оставим, если где-то понадобится отдельно

      const [screen, setScreen] = useState('settings');

        gridSize: 5,
        steps: 10,
        commandMode: 'voice+indicator',
        portals: 0,
        comets: 0,

        commandSpeed: 1.8 // в секундах

      const [countdown, setCountdown] = useState(3);
      const [route, setRoute] = useState([]);
      const [currentStep, setCurrentStep] = useState(0);
      const [leoPosition, setLeoPosition] = useState({ x: 0, y: 0 });
      const [routeStartPosition, setRouteStartPosition] = useState({ x: 0, y: 0 });
      const [playerGuess, setPlayerGuess] = useState(null);
      const [isCorrect, setIsCorrect] = useState(null);
      const [showingRoute, setShowingRoute] = useState(false);

      const [portalsPositions, setPortalsPositions] = useState([]);
      const [cometsPositions, setCometsPositions] = useState([]);
      const [message, setMessage] = useState('');
      // === АВТОМАТИЧЕСКОЕ ОПРЕДЕЛЕНИЕ ЯЗЫКА ИЗ ССЫЛКИ ===
      // 1. Читаем параметр ?lang=...
      const urlParams = new URLSearchParams(window.location.search);
      const urlLang = urlParams.get('lang');

      // 2. Определяем стартовый язык: Ссылка -> Браузер -> 'ru'
      const getInitialLanguage = () => {
        if (urlLang && ['en', 'ua', 'ru', 'es'].includes(urlLang)) {
          return urlLang; // Ссылка главнее всего
        }
        // Если в ссылке нет, пробуем угадать по браузеру
        const browserLang = (navigator.language || "").toLowerCase();
        if (browserLang.startsWith('ua') || browserLang.startsWith('uk')) return 'ua';
        if (browserLang.startsWith('en')) return 'en';
        if (browserLang.startsWith('es')) return 'es';
        return 'ru'; // По умолчанию

      const [language, setLanguage] = useState(getInitialLanguage());
      // ==================================================

          whereCometWas: '¿Dónde estaba el cometa?',
          cometCorrect: '¡Correcto! ¡El cometa estaba aquí!',
          excellent: '¡Excelente!',
          cometIncorrect: 'Incorrecto, inténtalo de nuevo.',
          commandSpeed: 'Velocidad de comandos:',
          loading: 'Cargando...'
        }
      };

      const t = translations[language];

      // === Функция предзагрузки аудио с ожиданием ===
      const preloadAudio = (path) => {
        return new Promise((resolve, reject) => {
          if (audioCache.current[path]) {
            resolve(audioCache.current[path]);
            return;
          }
          
          const audio = new Audio(path);
          audio.preload = 'auto';
          
          const onCanPlay = () => {
            audio.removeEventListener('canplaythrough', onCanPlay);
            audio.removeEventListener('error', onError);
            audioCache.current[path] = audio;
            resolve(audio);
          };
          
          const onError = (e) => {
            audio.removeEventListener('canplaythrough', onCanPlay);
            audio.removeEventListener('error', onError);
            console.warn(`Failed to preload audio: ${path}`, e);
            reject(e);
          };
          
          audio.addEventListener('canplaythrough', onCanPlay);
          audio.addEventListener('error', onError);
          audio.load();
        });
      };

      // === Воспроизведение звуков ===
      // Языковые звуки: up/down/left/right/start — из ./sounds/{lang}/
      const playLangSound = async (soundName) => {
        const soundPath = withV(`./sounds/${language}/${soundName}.mp3`);
        try {
          // Используем закэшированный аудио или создаем новый
          let audio = audioCache.current[soundPath];
          if (!audio) {
            audio = new Audio(soundPath);
            audio.preload = 'auto';
            audioCache.current[soundPath] = audio;
            await new Promise((resolve) => {
              audio.addEventListener('canplaythrough', resolve, { once: true });
              audio.load();
            });
          }
          
          // Создаем клон для одновременного воспроизведения
          const audioClone = audio.cloneNode();
          audioClone.volume = audio.volume;
          const playPromise = audioClone.play();
          if (playPromise !== undefined) {
            playPromise.catch(() => speak(t[soundName] || soundName));
          }
        } catch {
          speak(t[soundName] || soundName);
        }
      };

      // Общий клик (один для всех языков): ./sounds/click.mp3
      const playClick = async () => {
        const soundPath = withV(`./sounds/click.mp3`);
        try {
          if (!audioCache.current[soundPath]) {
            const audio = new Audio(soundPath);
            audio.preload = 'auto';
            audioCache.current[soundPath] = audio;
          }
          const audio = audioCache.current[soundPath];
          audio.currentTime = 0;
          await audio.play();
        } catch (e) {
          // клик без озвучки-замены, просто игнор
        }
      };

      const speak = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          const langCodes = { ua: 'uk-UA', en: 'en-US', ru: 'ru-RU', es: 'es-ES' };
          utterance.lang = langCodes[language];
          utterance.rate = 0.9;
          window.speechSynthesis.speak(utterance);
        }
      };
      // Звук телепортации
      const playTeleport = async () => {
        const soundPath = withV(`./sounds/teleport.mp3`);
        try {
          if (!audioCache.current[soundPath]) {
            const audio = new Audio(soundPath);
            audio.preload = 'auto';
            audioCache.current[soundPath] = audio;
          }
          const audio = audioCache.current[soundPath];
          audio.currentTime = 0;
          await audio.play();
        } catch (e) {
          // тихо игнорируем ошибку
        }
      };

      // Звук фанфар
      const playFireworks = async () => {
        const soundPath = withV(`./sounds/fireworks.mp3`);
        try {
          if (!audioCache.current[soundPath]) {
            const audio = new Audio(soundPath);
            audio.preload = 'auto';
            audioCache.current[soundPath] = audio;
          }
          const audio = audioCache.current[soundPath];
          audio.currentTime = 0;
          await audio.play();
        } catch (e) {
          // тихо игнорируем ошибку
        }
      };


      // === Генерация маршрута ===
      const generateRoute = () => {
        const { gridSize, steps, startPosition, portals, comets } = settings;
        const center = Math.floor(gridSize / 2);
        const start = startPosition === 'center'
          ? { x: center, y: center }
          : { x: Math.floor(Math.random() * gridSize), y: Math.floor(Math.random() * gridSize) };

        setLeoPosition(start);
        setRouteStartPosition(start);

        const newPortals = [];
        for (let i = 0; i < portals; i++) {
          let portal1, portal2;
          do {
            portal1 = { x: Math.floor(Math.random() * gridSize), y: Math.floor(Math.random() * gridSize) };
            portal2 = { x: Math.floor(Math.random() * gridSize), y: Math.floor(Math.random() * gridSize) };
          } while (
            (portal1.x === start.x && portal1.y === start.y) ||
            (portal2.x === start.x && portal2.y === start.y) ||
            (portal1.x === portal2.x && portal1.y === portal2.y) ||
            newPortals.some(p =>
              (p.pos1.x === portal1.x && p.pos1.y === portal1.y) ||
              (p.pos2.x === portal1.x && p.pos2.y === portal1.y) ||
              (p.pos1.x === portal2.x && p.pos1.y === portal2.y) ||
              (p.pos2.x === portal2.x && p.pos2.y === portal2.y)
            )
          );
          newPortals.push({ pos1: portal1, pos2: portal2, image: IMAGES.portals[i % IMAGES.portals.length] });
        }
        setPortalsPositions(newPortals);

        const newComets = [];
        for (let i = 0; i < comets; i++) {
          let cometPos;
          do {
            cometPos = { x: Math.floor(Math.random() * gridSize), y: Math.floor(Math.random() * gridSize) };
          } while (
            (cometPos.x === start.x && cometPos.y === start.y) ||
            newComets.some(c => c.x === cometPos.x && c.y === cometPos.y) ||
            newPortals.some(p => (p.pos1.x === cometPos.x && p.pos1.y === cometPos.y) || (p.pos2.x === cometPos.x && p.pos2.y === cometPos.y))
          );
          newComets.push(cometPos);
        }
        setCometsPositions(newComets);
        setRevealedComets([]);

        const newRoute = [];
        let currentPos = { x: start.x, y: start.y };
        let lastDirection = null;
        const visitedRecently = [];
        const maxHistorySize = 10;

        const getOpposite = (dir) => {
          const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
          return opposites[dir];
        };

        const wasRecentlyVisited = (x, y) => {
          return visitedRecently.some(pos => pos.x === x && pos.y === y);
        };

        for (let i = 0; i < steps; i++) {
          visitedRecently.push({ x: currentPos.x, y: currentPos.y });
          if (visitedRecently.length > maxHistorySize) visitedRecently.shift();

          const allDirections = [];
          if (currentPos.y > 0) allDirections.push('up');
          if (currentPos.y < gridSize - 1) allDirections.push('down');
          if (currentPos.x > 0) allDirections.push('left');
          if (currentPos.x < gridSize - 1) allDirections.push('right');
          if (allDirections.length === 0) break;

          const weightedDirections = [];
          for (const dir of allDirections) {
            let testX = currentPos.x, testY = currentPos.y;
            if (dir === 'up') testY--;
            if (dir === 'down') testY++;
            if (dir === 'left') testX--;
            if (dir === 'right') testX++;

            let weight = 1;
            if (lastDirection && dir === getOpposite(lastDirection)) continue;
            if (lastDirection && dir === lastDirection) weight = 2;
            if (wasRecentlyVisited(testX, testY)) weight = 0.1;

            const distanceFromEdges = Math.min(
              testX, testY, gridSize - 1 - testX, gridSize - 1 - testY
            );
            if (distanceFromEdges <= 1) weight *= 0.3;
            else if (distanceFromEdges >= gridSize / 3) weight *= 1.2;

            weightedDirections.push({ direction: dir, weight });
          }

          if (weightedDirections.length === 0) {
            if (allDirections.length > 0) weightedDirections.push({ direction: allDirections[0], weight: 1 });
            else break;
          }

          const totalWeight = weightedDirections.reduce((s, it) => s + it.weight, 0);
          let rnd = Math.random() * totalWeight;
          let selectedDirection = weightedDirections[0].direction;
          for (const it of weightedDirections) {
            rnd -= it.weight;
            if (rnd <= 0) { selectedDirection = it.direction; break; }
          }

          let newX = currentPos.x, newY = currentPos.y;
          if (selectedDirection === 'up') newY--;
          if (selectedDirection === 'down') newY++;
          if (selectedDirection === 'left') newX--;
          if (selectedDirection === 'right') newX++;

          if (newX < 0 || newX >= gridSize || newY < 0 || newY >= gridSize) break;
          currentPos = { x: newX, y: newY };
          lastDirection = selectedDirection;

          const portal = newPortals.find(p =>
            (p.pos1.x === currentPos.x && p.pos1.y === currentPos.y) ||
            (p.pos2.x === currentPos.x && p.pos2.y === currentPos.y)
          );

          if (portal) {
            currentPos = portal.pos1.x === currentPos.x && portal.pos1.y === currentPos.y
              ? { x: portal.pos2.x, y: portal.pos2.y }
              : { x: portal.pos1.x, y: portal.pos1.y };
            lastDirection = null;
          }

          if (currentPos.x < 0 || currentPos.x >= gridSize || currentPos.y < 0 || currentPos.y >= gridSize) break;
          newRoute.push({ direction: selectedDirection, position: { x: currentPos.x, y: currentPos.y } });
        }

        setRoute(newRoute);
      };

      const startGame = () => setScreen('confirm');

      const confirmSettings = async () => {
        setLoadingAudio(true);
        generateRoute();

        // Предзагрузка всех звуков с ожиданием
        try {
          const langSounds = ['start', 'up', 'down', 'left', 'right'];
          const soundPaths = [
            ...langSounds.map(sound => withV(`./sounds/${language}/${sound}.mp3`)),
            withV(`./sounds/click.mp3`),
            withV(`./sounds/teleport.mp3`),
            withV(`./sounds/fireworks.mp3`)
          ];
          
          // Загружаем все звуки параллельно
          await Promise.all(soundPaths.map(path => 
            preloadAudio(path).catch(e => console.warn('Audio preload failed:', path))
          ));
        } catch (e) {
          console.warn('Some audio files failed to preload, continuing anyway');
        }

        setLoadingAudio(false);
        setScreen('countdown');
        setCountdown(3);
        setGameStarted(true);
      };

      // === Обратный отсчёт: 3–2–1 с кликом, затем "старт" ===
      useEffect(() => {
        if (screen === 'countdown' && gameStarted) {
          if (countdown > 0) {
            // каждый тик — проигрываем click.mp3
            playClick();
            const timer = setTimeout(() => setCountdown(countdown - 1), 1000);
            return () => clearTimeout(timer);
          } else {
            // "Старт" — языковой звук
            playLangSound('start');
            setTimeout(() => {
              setScreen('game');
              setCurrentStep(0);
              setTimeout(() => { routeIntervalRef.current = playRoute(); }, 500);
            }, 1000);
          }
        }
      }, [screen, countdown, gameStarted]);

      // === Проигрывание маршрута (команды) ===
      // === useEffect для автоматического показа пути после салюта ===
      const playRoute = () => {
        let step = 0;
        const intervalTime = settings.commandSpeed * 1000;

        const interval = setInterval(() => {
          if (step < route.length) {
            setCurrentDirection(route[step].direction);
            if (settings.commandMode === 'voice' || settings.commandMode === 'voice+indicator') {
              playLangSound(route[step].direction);
            }
            step++;
            setCurrentStep(step);
          } else {
            clearInterval(interval);
            routeIntervalRef.current = null;
            setCurrentDirection(null);

            if (cometsPositions.length > 0) setShowComets(false);
            setMessage(t.whereLeo);
          }
        }, intervalTime);
        return interval;
      };

      const checkAnswer = (x, y) => {
        if (showingRoute) return;
        if (routeIntervalRef.current) { clearInterval(routeIntervalRef.current); routeIntervalRef.current = null; }
        if (window.speechSynthesis) window.speechSynthesis.cancel();

        setPlayerGuess({ x, y });
        const finalPos = route[route.length - 1].position;

        if (x === finalPos.x && y === finalPos.y) {
          setIsCorrect(true);
          setMessage(t.correct);
          // НЕ показываем путь сразу!
          // Если есть кометы - будет поиск, затем салют, затем путь
          // Если нет комет - будет салют, затем путь
          setTimeout(() => { 
            setMessage(''); 
            // Проверяем есть ли кометы
            if (cometsPositions.length > 0) {
              // Есть кометы - режим поиска
              setCometGuessMode(true);
              setMessage(t.whereCometWas);
            } else {
              // Нет комет - сразу к салюту
              setTimeout(() => {
                setScreen('fireworks');
              }, 1000);
            }
          }, 1500);
        } else {
          setIsCorrect(false);
          setMessage(t.incorrect);
        }
      };

      // === Показ правильного пути Лео (с кликом на каждый шаг) ===
      const showLeoRoute = () => {
        if (routeIntervalRef.current) { clearInterval(routeIntervalRef.current); routeIntervalRef.current = null; }
        setShowingRoute(true);
        const start = routeStartPosition;
        setLeoPosition(start);

        const areNeighbors = (p1, p2) => {
          const dx = Math.abs(p1.x - p2.x), dy = Math.abs(p1.y - p2.y);
          return (dx === 1 && dy === 0) || (dx === 0 && dy === 1);
        };

        let step = 0;
        let previousPos = start;

        const moveToNextPosition = () => {
          if (step < route.length) {
            const nextPos = route[step].position;
            const direction = route[step].direction;

            if (!areNeighbors(previousPos, nextPos)) {
              // телепорт: сначала к порталу, затем перенос
              let portalEntry = { ...previousPos };
              if (direction === 'up') portalEntry.y--;
              if (direction === 'down') portalEntry.y++;
              if (direction === 'left') portalEntry.x--;
              if (direction === 'right') portalEntry.x++;

              if (previousPos.x !== portalEntry.x || previousPos.y !== portalEntry.y) {
                playClick();
                setLeoPosition(portalEntry);
                setTimeout(() => {
                  playTeleport();
                  setLeoPosition(nextPos);
                  previousPos = nextPos;
                  step++;
                  setTimeout(moveToNextPosition, settings.commandSpeed * 1000);
                }, settings.commandSpeed * 1000);
              } else {
                playTeleport();
                setLeoPosition(nextPos);
                previousPos = nextPos;
                step++;
                setTimeout(moveToNextPosition, settings.commandSpeed * 1000);
              }
            } else {
              // обычный шаг
              playClick();
              setLeoPosition(nextPos);
              previousPos = nextPos;
              step++;
              setTimeout(moveToNextPosition, settings.commandSpeed * 1000);
            }
          } else {
            setShowingRoute(false);
            // Путь показан, переходим к результатам
            setScreen('results');
          }
        };

        setTimeout(moveToNextPosition, settings.commandSpeed * 1000);
      };

      const checkCometAnswer = (x, y) => {
        setCometGuess(null);
        setTimeout(() => {
          setCometGuess({ x, y });
          let isCometHere = false;
          for (let i = 0; i < cometsPositions.length; i++) {
            if (cometsPositions[i].x === x && cometsPositions[i].y === y) { isCometHere = true; break; }
          }
          if (isCometHere) {
            // Добавляем найденную комету в список
            const newRevealed = [...revealedComets, { x, y }];
            setRevealedComets(newRevealed);
            
            // Показываем сообщение с количеством найденных
            const foundCount = newRevealed.length;
            const totalCount = cometsPositions.length;
            setMessage(t.cometCorrect + ` (${foundCount}/${totalCount})`);
            
            setTimeout(() => {
              setCometGuess(null);
              
              // Проверяем - все ли кометы найдены?
              if (foundCount === totalCount) {
                // Все найдены! Показываем ВСЕ кометы
                setShowComets(true);
                setCometGuessMode(false);
                setMessage('');
                
                // Пауза 1 секунда, затем салют
                setTimeout(() => {
                  setScreen('fireworks');
                }, 1000);
              } else {
                // Ещё не все найдены, продолжаем искать
                setMessage(t.whereCometWas + ` (${foundCount}/${totalCount})`);
              }
            }, 1000);
          } else {
            setMessage(t.cometIncorrect);
            setTimeout(() => {
              setCometGuess(null);
              const foundCount = revealedComets.length;
              const totalCount = cometsPositions.length;
              setMessage(t.whereCometWas + ` (${foundCount}/${totalCount})`);
            }, 1000);
          }
        }, 10);
      };

      const repeatRound = () => {
        if (routeIntervalRef.current) { clearInterval(routeIntervalRef.current); routeIntervalRef.current = null; }
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        setScreen('game');
        setCurrentStep(0);
        setPlayerGuess(null);
        setIsCorrect(null);
        setMessage('');
        setCurrentDirection(null);
        setCometGuessMode(false);
        setCometGuess(null);
        setShowComets(true);
        setRevealedComets([]);
        setLeoPosition(routeStartPosition);
        setTimeout(() => { routeIntervalRef.current = playRoute(); }, 500);
      };

      const nextRound = () => {
        setPlayerGuess(null);
        setCometGuess(null);
        setCometGuessMode(false);
        setShowComets(true);
        setRevealedComets([]);
        setGameStarted(false);
        startGame();

      const exitGame = () => {
        if (routeIntervalRef.current) { clearInterval(routeIntervalRef.current); routeIntervalRef.current = null; }
        if (window.speechSynthesis) window.speechSynthesis.cancel();

        setRoute([]);
        setCurrentStep(0);
        setPlayerGuess(null);
        setIsCorrect(null);
        setMessage('');
        setCurrentDirection(null);
        setGameStarted(false);

      const Header = () => (

            </div>
          </div>
        </div>
      );

      const renderGrid = () => {
        const cells = [];
        const maxSize = Math.min(600, window.innerWidth * 0.95, window.innerHeight * 0.7);
        const cellSize = maxSize / settings.gridSize;
        let cellNumber = 1;

        for (let y = 0; y < settings.gridSize; y++) {
          for (let x = 0; x < settings.gridSize; x++) {
            const isLeo = leoPosition.x === x && leoPosition.y === y;
            const portal = portalsPositions.find(p => (p.pos1.x === x && p.pos1.y === y) || (p.pos2.x === x && p.pos2.y === y));
            const isComet = cometsPositions.some(c => c.x === x && c.y === y);
            const isPlayerGuess = playerGuess && playerGuess.x === x && playerGuess.y === y;
            const isCometGuess = cometGuess && cometGuess.x === x && cometGuess.y === y;
            const numberFontSize = Math.max(12, cellSize * 0.3);
            const imageSize = Math.max(30, cellSize * 0.7);

            cells.push(
              <div key={`${x}-${y}`}
                onClick={() => {
                  if (cometGuessMode) {
                    checkCometAnswer(x, y);
                  } else if (screen === 'game' && !showingRoute && currentStep === route.length) {
                    checkAnswer(x, y);
                  }
                }}
                className={`relative border border-blue-300/30 transition-all ${
                  cometGuessMode || (screen === 'game' && currentStep === route.length && !cometGuessMode && !showingRoute) ? 'cursor-pointer hover:bg-blue-100/20' : ''
                } ${isPlayerGuess && !cometGuessMode ? (isCorrect ? 'bg-green-300/40' : 'bg-red-300/40') : ''} ${
                  isCometGuess && cometGuessMode ? (isComet ? 'bg-green-300/40' : 'bg-red-300/40') : ''
                }`}
                style={{ width: cellSize, height: cellSize }}>
                <div className="absolute inset-0 flex items-center justify-center text-white/50 font-bold pointer-events-none"
                  style={{ fontSize: `${numberFontSize}px` }}>{cellNumber++}</div>
                {portal && <div className="absolute inset-0 flex items-center justify-center">
                  <img src={portal.image} alt="Portal" className="animate-spin" style={{ width: `${imageSize}px`, height: `${imageSize}px`, animationDuration: '4s' }} />
                </div>}
                {isComet && (showComets || revealedComets.some(c => c.x === x && c.y === y)) && <div className="absolute inset-0 flex items-center justify-center">
                  <img src={IMAGES.comet} alt="Comet" className="animate-pulse" style={{ width: `${imageSize}px`, height: `${imageSize}px` }} />
                </div>}
                {isLeo && <div className="absolute inset-0 flex items-center justify-center z-20">
                  <img src={IMAGES.leo} alt="Leo" className="transition-all duration-300" style={{ width: `${imageSize}px`, height: `${imageSize}px` }} />
                </div>}
              </div>
            );
          }
        }

        return (
          <div className="relative mx-auto" style={{ width: maxSize, height: maxSize }}>
            <div className="grid relative" style={{ gridTemplateColumns: `repeat(${settings.gridSize}, 1fr)`, width: maxSize, height: maxSize, zIndex: 10 }}>
              {cells}
            </div>
            <PathOverlay maxSize={maxSize} cellSize={cellSize} />
          </div>
        );
      };

      const PathOverlay = ({ maxSize, cellSize }) => {
        if (route.length === 0) return null;
        if (!showingRoute && screen !== 'results') return null;

        const getCoords = (x, y) => ({
          x: x * cellSize + cellSize / 2,
          y: y * cellSize + cellSize / 2
        });

        const areNeighbors = (pos1, pos2) => {
          const dx = Math.abs(pos1.x - pos2.x);
          const dy = Math.abs(pos1.y - pos2.y);
          return (dx === 1 && dy === 0) || (dx === 0 && dy === 1);
        };

        const startPos = routeStartPosition;
        const pathPoints = [startPos, ...route.map(step => step.position)];

        const lines = [];
        for (let i = 0; i < pathPoints.length - 1; i++) {
          const from = pathPoints[i];
          const to = pathPoints[i + 1];
          const fromCoords = getCoords(from.x, from.y);
          const toCoords = getCoords(to.x, to.y);
          const isNeighbor = areNeighbors(from, to);

          if (!isNeighbor) {
            const direction = route[i] ? route[i].direction : null;
            let portalEntry = { ...from };
            if (direction === 'up') portalEntry.y--;
            if (direction === 'down') portalEntry.y++;
            if (direction === 'left') portalEntry.x--;
            if (direction === 'right') portalEntry.x++;

            if (from.x !== portalEntry.x || from.y !== portalEntry.y) {
              const portalCoords = getCoords(portalEntry.x, portalEntry.y);
              lines.push({ from: fromCoords, to: portalCoords, color: '#FB923C', type: 'walk' });
            }

            const portalCoords = getCoords(portalEntry.x, portalEntry.y);
            lines.push({ from: portalCoords, to: toCoords, color: '#3B82F6', type: 'teleport' });
          } else {
            lines.push({ from: fromCoords, to: toCoords, color: '#FB923C', type: 'walk' });
          }
        }

        return (
          <svg
            className="absolute inset-0"
            style={{ width: maxSize, height: maxSize, zIndex: 0, pointerEvents: 'none', top: 0, left: 0 }}
            viewBox={`0 0 ${maxSize} ${maxSize}`}
          >
            {lines.map((line, i) => (
              <line
                key={`line-${i}`}
                x1={line.from.x}
                y1={line.from.y}
                x2={line.to.x}
                y2={line.to.y}
                stroke={line.color}
                strokeWidth="10"
                strokeLinecap="round"
                opacity={line.type === 'teleport' ? '0.7' : '0.9'}
                strokeDasharray={line.type === 'teleport' ? '20 10' : 'none'}
                className={line.type === 'teleport' ? 'teleport-line' : ''}
              />
            ))}
            {pathPoints.map((point, i) => {
              const coords = getCoords(point.x, point.y);
              return <circle key={`point-${i}`} cx={coords.x} cy={coords.y} r="6" fill="#FCD34D" opacity="0.9" />;
            })}
          </svg>
        );
      };

      const DirectionIndicator = () => {
        const boxSize = 100;
        const ArrowSVG = ({ direction }) => {
          const rotations = { up: 270, down: 90, left: 180, right: 0 };
          return (
            <svg width={boxSize * 0.75} height={boxSize * 0.75} viewBox="0 0 100 100" style={{ transform: `rotate(${rotations[direction]}deg)` }}>
              <defs>
                <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" style={{ stopColor: '#F97316', stopOpacity: 1 }} />
                  <stop offset="100%" style={{ stopColor: '#FB923C', stopOpacity: 1 }} />
                </linearGradient>
                <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" floodOpacity="0.3"/></filter>
              </defs>
              <path d="M 20 35 L 60 35 L 60 15 L 90 50 L 60 85 L 60 65 L 20 65 Z"
                    fill="url(#arrowGradient)" stroke="#1F2937" strokeWidth="4" strokeLinejoin="round" filter="url(#shadow)"/>
            </svg>
          );
        };

        return (
          <div className="flex items-end justify-center" style={{ minHeight: 120 }}>
            {currentDirection && settings.commandMode !== 'voice' ? (
              <div
                key={currentDirection + currentStep}
                className="bg-gradient-to-br from-amber-50 to-orange-100 backdrop-blur-sm rounded-2xl shadow-2xl border-4 border-orange-400 flex items-center justify-center overflow-hidden"
                style={{ width: `${boxSize}px`, height: `${boxSize}px`, minWidth: `${boxSize}px`, minHeight: `${boxSize}px`, padding: 0, animation: 'pulse 0.5s ease-in-out' }}>
                <ArrowSVG direction={currentDirection} />
              </div>
            ) : message ? (
              <div className="bg-gradient-to-br from-amber-50 to-orange-100 rounded-2xl shadow-2xl px-6 py-4 animate-bounce flex items-center justify-center max-w-md border-2 border-orange-300">
                <p className="text-orange-600 text-center font-bold text-2xl md:text-3xl">{message}</p>
              </div>
            ) : null}
          </div>
        );
      };

      // === Экраны ===
      // === useEffect для салюта (запускается когда screen === 'fireworks') ===
      useEffect(() => {
        if (screen === 'fireworks') {
          // Воспроизводим звук фанфар
          playFireworks();
          
          // Конфигурация салюта со звёздочками
          const duration = 2000; // 2 секунды
          const animationEnd = Date.now() + duration;
          
          const randomInRange = (min, max) => Math.random() * (max - min) + min;
          
          const interval = setInterval(() => {
            const timeLeft = animationEnd - Date.now();
            
            if (timeLeft <= 0) {
              clearInterval(interval);
              // После салюта переходим на экран игры и запускаем автопоказ пути
              setTimeout(() => {
                setScreen('game');
                setShouldAutoShowRoute(true);
              }, 100);
              return;
            }
            
            // Золотые и жёлтые звёздочки
            if (typeof confetti !== 'undefined') {
              confetti({
                particleCount: 2,
                angle: randomInRange(55, 125),
                spread: randomInRange(50, 70),
                origin: { x: randomInRange(0.1, 0.9), y: Math.random() - 0.2 },
                colors: ['#FFD700', '#FFA500', '#FFFF00', '#FFFFFF'],
                shapes: ['star'],
                scalar: randomInRange(1, 2),
                gravity: 1.2,
                drift: randomInRange(-0.5, 0.5),
                ticks: 200
              });
            }
          }, 40);
          
          return () => clearInterval(interval);
        }
      }, [screen]);

      // === useEffect для автопоказа пути после салюта ===
      useEffect(() => {
        if (shouldAutoShowRoute && screen === 'game') {
          setShouldAutoShowRoute(false); // Сбрасываем флаг
          setTimeout(() => {
            // Запускаем показ пути (логика из showLeoRoute)
            if (routeIntervalRef.current) { 
              clearInterval(routeIntervalRef.current); 
              routeIntervalRef.current = null; 
            }
            setShowingRoute(true);
            const start = routeStartPosition;
            setLeoPosition(start);

            const areNeighbors = (p1, p2) => {
              const dx = Math.abs(p1.x - p2.x), dy = Math.abs(p1.y - p2.y);
              return (dx === 1 && dy === 0) || (dx === 0 && dy === 1);
            };

            let step = 0;
            let previousPos = start;

            const moveToNextPosition = () => {
              if (step < route.length) {
                const nextPos = route[step].position;
                const direction = route[step].direction;

                if (!areNeighbors(previousPos, nextPos)) {
                  // телепорт
                  let portalEntry = { ...previousPos };
                  if (direction === 'up') portalEntry.y--;
                  if (direction === 'down') portalEntry.y++;
                  if (direction === 'left') portalEntry.x--;
                  if (direction === 'right') portalEntry.x++;

                  if (previousPos.x !== portalEntry.x || previousPos.y !== portalEntry.y) {
                    playClick();
                    setLeoPosition(portalEntry);
                    setTimeout(() => {
                      playTeleport();
                      setLeoPosition(nextPos);
                      previousPos = nextPos;
                      step++;
                      setTimeout(moveToNextPosition, settings.commandSpeed * 1000);
                    }, settings.commandSpeed * 1000);
                  } else {
                    playTeleport();
                    setLeoPosition(nextPos);
                    previousPos = nextPos;
                    step++;
                    setTimeout(moveToNextPosition, settings.commandSpeed * 1000);
                  }
                } else {
                  // обычный шаг
                  playClick();
                  setLeoPosition(nextPos);
                  previousPos = nextPos;
                  step++;
                  setTimeout(moveToNextPosition, settings.commandSpeed * 1000);
                }
              } else {
                setShowingRoute(false);
                setScreen('results');
              }
            };

            setTimeout(moveToNextPosition, settings.commandSpeed * 1000);
          }, 500);
        }
      }, [shouldAutoShowRoute, screen, route, routeStartPosition, settings.commandSpeed]);

      if (screen === 'settings') {
        return (
          <div className="min-h-screen">
            <Header />
            <div className="p-4 md:p-8">
              <div className="max-w-2xl mx-auto">
                <div className="bg-gradient-to-br from-amber-50 to-orange-100 rounded-3xl shadow-2xl p-4 sm:p-6 md:p-8 space-y-4 sm:space-y-6 border-4 border-orange-300">
                  <h2 className="text-xl sm:text-2xl font-bold text-orange-600 mb-4">{t.settings}</h2>
                  <div>
                    <label className="block text-gray-700 font-semibold mb-2 text-sm sm:text-base">{t.gridSize} {settings.gridSize}×{settings.gridSize}</label>
                    <input type="range" min="3" max="15" value={settings.gridSize} onChange={(e) => setSettings({...settings, gridSize: parseInt(e.target.value)})}
                      className="w-full h-2 sm:h-3 bg-orange-200 rounded-lg appearance-none cursor-pointer" />
                  </div>
                  <div>
                    <label className="block text-gray-700 font-semibold mb-2 text-sm sm:text-base">{t.steps} {settings.steps}</label>
                    <input type="range" min="3" max="100" value={settings.steps} onChange={(e) => setSettings({...settings, steps: parseInt(e.target.value)})}
                      className="w-full h-2 sm:h-3 bg-orange-200 rounded-lg appearance-none cursor-pointer" />
                  </div>
                  <div>
                    <label className="block text-gray-700 font-semibold mb-2 text-sm sm:text-base">{t.commandMode}</label>
                    <select value={settings.commandMode} onChange={(e) => setSettings({...settings, commandMode: e.target.value})}
                      className="w-full p-2 sm:p-3 text-sm sm:text-base border-2 border-orange-300 rounded-lg focus:border-orange-500 focus:outline-none bg-white">
                      <option value="voice">{t.voice}</option>
                      <option value="voice+indicator">{t.voiceIndicator}</option>
                      <option value="indicator">{t.indicator}</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-gray-700 font-semibold mb-2 text-sm sm:text-base">{t.commandSpeed} {settings.commandSpeed}s</label>
                    <select value={settings.commandSpeed} onChange={(e) => setSettings({...settings, commandSpeed: parseFloat(e.target.value)})}
                      className="w-full p-2 sm:p-3 text-sm sm:text-base border-2 border-orange-300 rounded-lg focus:border-orange-500 focus:outline-none bg-white">
                      <option value="0.5">0.5s</option>
                      <option value="0.7">0.7s</option>
                      <option value="1">1.0s</option>
                      <option value="1.2">1.2s</option>
                      <option value="1.5">1.5s</option>
                      <option value="1.7">1.7s</option>
                      <option value="1.8">1.8s (по умолчанию)</option>
                      <option value="2">2.0s</option>
                      <option value="2.5">2.5s</option>
                      <option value="3">3.0s</option>
                      <option value="3.5">3.5s</option>
                      <option value="4">4.0s</option>
                      <option value="4.5">4.5s</option>
                      <option value="5">5.0s</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-gray-700 font-semibold mb-2 text-sm sm:text-base">{t.portals} {settings.portals}</label>
                    <input type="range" min="0" max="4" value={settings.portals} onChange={(e) => setSettings({...settings, portals: parseInt(e.target.value)})}
                      className="w-full h-2 sm:h-3 bg-orange-200 rounded-lg appearance-none cursor-pointer" />
                  </div>
                  <div>
                    <label className="block text-gray-700 font-semibold mb-2 text-sm sm:text-base">{t.comets} {settings.comets}</label>
                    <input type="range" min="0" max="3" value={settings.comets} onChange={(e) => setSettings({...settings, comets: parseInt(e.target.value)})}
                      className="w-full h-2 sm:h-3 bg-orange-200 rounded-lg appearance-none cursor-pointer" />
                  </div>
                  <div>
                    <label className="block text-gray-700 font-semibold mb-2 text-sm sm:text-base">{t.startPosition}</label>
                    <select value={settings.startPosition} onChange={(e) => setSettings({...settings, startPosition: e.target.value})}
                      className="w-full p-2 sm:p-3 text-sm sm:text-base border-2 border-orange-300 rounded-lg focus:border-orange-500 focus:outline-none bg-white">
                      <option value="center">{t.center}</option>
                      <option value="random">{t.random}</option>
                    </select>
                  </div>
                  <button onClick={startGame} className="w-full py-3 sm:py-4 bg-gradient-to-r from-orange-500 to-red-500 text-white text-lg sm:text-xl font-bold rounded-xl shadow-lg hover:shadow-xl transform hover:scale-105 transition-all border-2 border-orange-600">{t.startGame}</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (screen === 'confirm') {
        return (
          <div className="min-h-screen">
            <Header />
            <div className="p-4 md:p-8">
              <div className="max-w-2xl mx-auto">
                <div className="bg-gradient-to-br from-amber-50 to-orange-100 rounded-3xl shadow-2xl p-4 sm:p-6 md:p-8 space-y-4 sm:space-y-6 border-4 border-orange-300">
                  <h2 className="text-xl sm:text-2xl font-bold text-orange-600 mb-4">{t.settingsSummary}</h2>
                  <div className="space-y-2 sm:space-y-3 text-gray-700">
                    <p className="text-sm sm:text-base md:text-lg"><strong>{t.gridSize}</strong> {settings.gridSize}×{settings.gridSize}</p>
                    <p className="text-sm sm:text-base md:text-lg"><strong>{t.steps}</strong> {settings.steps}</p>
                    <p className="text-sm sm:text-base md:text-lg"><strong>{t.commandMode}</strong> {settings.commandMode === 'voice' ? t.voice : settings.commandMode === 'voice+indicator' ? t.voiceIndicator : t.indicator}</p>
                    <p className="text-sm sm:text-base md:text-lg"><strong>{t.commandSpeed}</strong> {settings.commandSpeed}s</p>
                    <p className="text-sm sm:text-base md:text-lg"><strong>{t.portals}</strong> {settings.portals}</p>
                    <p className="text-sm sm:text-base md:text-lg"><strong>{t.comets}</strong> {settings.comets}</p>
                    <p className="text-sm sm:text-base md:text-lg"><strong>{t.startPosition}</strong> {settings.startPosition === 'center' ? t.center : t.random}</p>
                  </div>
                  <div className="flex flex-col sm:flex-row gap-3 sm:gap-4">
                    <button onClick={() => setScreen('settings')} disabled={loadingAudio} className="flex-1 py-3 sm:py-4 bg-gray-400 text-white text-base sm:text-lg md:text-xl font-bold rounded-xl shadow-lg hover:bg-gray-500 transition-all border-2 border-gray-500 disabled:opacity-50">{t.backToSettings}</button>
                    <button onClick={confirmSettings} disabled={loadingAudio} className="flex-1 py-3 sm:py-4 bg-gradient-to-r from-green-500 to-green-600 text-white text-base sm:text-lg md:text-xl font-bold rounded-xl shadow-lg hover:shadow-xl transform hover:scale-105 transition-all border-2 border-green-700 disabled:opacity-50 disabled:transform-none">
                      {loadingAudio ? (
                        <span className="flex items-center justify-center gap-2">
                          <svg className="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                          </svg>
                          {t.loading || 'Завантаження...'}
                        </span>
                      ) : t.confirm}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (screen === 'countdown') {
        return (
          <div className="min-h-screen">
            <Header />
            <div className="p-2 sm:p-4">
              <div className="max-w-4xl mx-auto">
                <div className="flex justify-end mb-2">
                  <button onClick={exitGame} className="px-4 sm:px-6 py-1.5 sm:py-2 text-sm sm:text-base bg-gradient-to-br from-amber-50 to-orange-100 rounded-full text-orange-600 font-semibold shadow-lg hover:shadow-xl border-2 border-orange-300 transition-all">{t.exit}</button>
                </div>
                <div className="relative">
                  <div className="rounded-2xl sm:rounded-3xl shadow-2xl p-2 sm:p-4 md:p-6 overflow-hidden bg-cover bg-center"
                    style={{ backgroundImage: `url(${IMAGES.background})`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                    {renderGrid()}
                  </div>
                  <div className="absolute inset-0 flex items-center justify-center pointer-events-none" style={{ zIndex: 1000 }}>
                    <div className="text-6xl sm:text-7xl md:text-9xl font-black text-white drop-shadow-2xl animate-pulse"
                      style={{ textShadow: '0 0 40px rgba(255,255,255,0.8), 0 0 80px rgba(255,255,255,0.4)' }}>
                      {countdown > 0 ? countdown : t.start}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }


      // === Экран салюта ===
      if (screen === 'fireworks') {
        
        return (
          <div className="min-h-screen flex items-center justify-center relative"
               style={{ 
                 backgroundImage: `url(${IMAGES.background})`,
                 backgroundSize: 'cover',
                 backgroundPosition: 'center'
               }}>
            <div className="absolute inset-0 flex flex-col items-center justify-center z-20 pointer-events-none">
              <div className="mb-8">
                <img src={IMAGES.leo} alt="Leo" className="w-48 h-48 animate-bounce" />
              </div>
              <h2 className="text-6xl font-bold text-yellow-400 drop-shadow-2xl animate-pulse"
                  style={{ textShadow: '0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.6)' }}>
                {t.excellent || 'Чудово!'}
              </h2>
            </div>
          </div>
        );
      }

      if (screen === 'game') {
        return (
          <div className="min-h-screen">
            <Header />
            <div className="p-2 sm:p-4">
              <div className="max-w-4xl mx-auto">
                <div className="flex items-end justify-between mb-2 gap-4">
                  <div className="flex-1"></div>
                  {!showingRoute && <DirectionIndicator />}
                  <div className="flex-1 flex justify-end">
                    <button onClick={exitGame} className="px-4 sm:px-6 py-1.5 sm:py-2 text-sm sm:text-base bg-gradient-to-br from-amber-50 to-orange-100 rounded-full text-orange-600 font-semibold shadow-lg hover:shadow-xl border-2 border-orange-300 transition-all">{t.exit}</button>
                  </div>
                </div>
                <div className="rounded-2xl sm:rounded-3xl shadow-2xl p-2 sm:p-4 md:p-6 relative overflow-hidden bg-cover bg-center"
                  style={{ backgroundImage: `url(${IMAGES.background})`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                  {renderGrid()}
                </div>
                <div className="mt-2 sm:mt-4 text-center text-white text-sm sm:text-base md:text-lg">
                  {cometGuessMode ? (
                    <p>{t.whereCometWas}</p>
                  ) : currentStep < route.length ? (
                    <p>{t.listening} ({currentStep}/{route.length})</p>
                  ) : (
                    <p>{t.clickWhere}</p>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (screen === 'results') {
        return (
          <div className="min-h-screen">
            <Header />
            <div className="p-2 sm:p-4">
              <div className="max-w-4xl mx-auto">
                <div className="flex justify-end mb-2">
                  <button onClick={exitGame} className="px-4 sm:px-6 py-1.5 sm:py-2 text-sm sm:text-base bg-gradient-to-br from-amber-50 to-orange-100 rounded-full text-orange-600 font-semibold shadow-lg hover:shadow-xl border-2 border-orange-300 transition-all">{t.exit}</button>
                </div>
                <div className="text-center mb-4 sm:mb-6">
                  <h2 className="text-2xl sm:text-3xl md:text-4xl font-bold text-white drop-shadow-lg mb-3 sm:mb-4">{t.wellDone}</h2>
                  <div className="flex justify-center gap-2 sm:gap-4 flex-wrap px-2">
                    <button onClick={repeatRound} className="px-4 sm:px-6 py-2 sm:py-3 text-sm sm:text-base bg-gradient-to-br from-yellow-100 to-yellow-300 rounded-full text-orange-900 font-semibold shadow-lg hover:shadow-xl border-2 border-yellow-400 transition-all">{t.repeatRound}</button>
                    <button onClick={nextRound} className="px-4 sm:px-6 py-2 sm:py-3 text-sm sm:text-base bg-gradient-to-br from-green-400 to-green-500 rounded-full text-white font-semibold shadow-lg hover:shadow-xl border-2 border-green-600 transition-all">{t.nextRound}</button>
                  </div>
                </div>
                <div className="rounded-2xl sm:rounded-3xl shadow-2xl p-2 sm:p-4 md:p-6 overflow-hidden bg-cover bg-center"
                  style={{ backgroundImage: `url(${IMAGES.background})`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                  {renderGrid()}
                </div>
              </div>
            </div>
          </div>
        );
      }

      return null;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LeoSpaceNavigator />);
  </script>
</body>
</html>
